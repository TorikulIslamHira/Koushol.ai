name: Deploy

# Runs on a self-hosted runner installed directly on the VPS — the VPS is on a private
# network (not reachable from GitHub-hosted runners), so build + deploy both happen locally
# on the machine instead of over SSH/rsync from GitHub's cloud. See deploy/README.md for the
# one-time runner + VPS setup this depends on.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  DEPLOY_BASE_PATH: /var/www/koushol

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Set release id
        id: release
        run: echo "id=$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Copy dist into a new release directory
        run: |
          RELEASE_DIR="$DEPLOY_BASE_PATH/releases/${{ steps.release.outputs.id }}"
          mkdir -p "$RELEASE_DIR"
          cp -r dist/. "$RELEASE_DIR/"

      - name: Activate the new release (atomic symlink swap + nginx reload + prune old releases)
        run: "$DEPLOY_BASE_PATH/activate-release.sh ${{ steps.release.outputs.id }}"
